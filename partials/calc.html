<section x-data class="space-y-6">
  <template x-if="!$store.wf.loaded">
    <div class="text-dim text-sm" x-text="$store.wf.t('loading')"></div>
  </template>

  <div x-show="$store.wf.loaded" class="space-y-6">
    <header class="space-y-2">
      <div class="font-mono text-xs tracking-widest text-haz" x-text="$store.wf.t('opt_label')"></div>
      <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight" x-text="$store.wf.t('opt_title')"></h1>
      <p class="text-sm text-dim max-w-2xl leading-relaxed" x-text="$store.wf.t('opt_sub')"></p>
    </header>

    <!-- управление -->
    <div class="flex flex-wrap gap-4 items-center" x-show="$store.wf.selCount">
      <button @click="$store.wf.clearSel()"
        class="px-3 py-1.5 text-xs border border-line text-dim hover:text-haz hover:border-haz ml-auto" x-text="'× '+$store.wf.t('reset')"></button>
    </div>

    <!-- выбранные детали -->
    <div class="border border-line bg-panel p-3" x-show="$store.wf.selCount">
      <div class="text-xs text-dim mb-2"><span x-text="$store.wf.t('selected')"></span>: <span class="text-haz font-bold" x-text="$store.wf.selCount"></span></div>
      <div class="flex flex-wrap gap-2">
        <template x-for="k in $store.wf.selKeys" :key="k">
          <span class="flex items-center gap-2 border border-haz/50 bg-ink px-2 py-1 text-sm">
            <span class="text-haz" x-text="k"></span>
            <button @click="$store.wf.remove(k)" class="text-dim hover:text-haz">×</button>
          </span>
        </template>
      </div>
    </div>

    <!-- пусто -->
    <div x-show="!$store.wf.selCount" class="border border-line bg-panel p-10 text-center space-y-2">
      <div class="text-2xl font-bold text-dim" x-text="$store.wf.t('empty_title')"></div>
      <p class="text-sm text-dim" x-text="$store.wf.t('empty_text')"></p>
    </div>

    <!-- фильтр по типу миссии -->
    <div x-show="$store.wf.selCount && $store.wf.availTypes().length" class="space-y-2">
      <div class="text-xs text-dim" x-text="$store.wf.t('filter_type')+':'"></div>
      <div class="flex flex-wrap gap-1.5">
        <button @click="$store.wf.clearTypes()"
          :class="$store.wf.typeCount===0 ? 'bg-haz text-bone border-haz' : 'bg-panel text-dim border-line hover:text-txt'"
          class="px-2.5 py-1 text-xs border" x-text="$store.wf.t('all')"></button>
        <template x-for="t in $store.wf.availTypes()" :key="t">
          <button @click="$store.wf.toggleType(t)"
            :class="$store.wf.typeOn(t) ? 'bg-haz text-bone border-haz' : 'bg-panel text-dim border-line hover:text-txt'"
            class="px-2.5 py-1 text-xs border" x-text="t"></button>
        </template>
      </div>
    </div>

    <!-- легенда ротаций -->
    <p x-show="$store.wf.selCount" class="text-[11px] text-dim leading-relaxed max-w-3xl border-l-2 border-haz/40 pl-3" x-text="$store.wf.t('rot_legend')"></p>

    <!-- список локаций (компактная таблица) -->
    <div x-show="$store.wf.selCount" class="border border-line">
      <div class="grid items-center gap-2 px-3 py-1.5 bg-panel2 text-[10px] uppercase tracking-wide text-dim border-b border-line"
           style="grid-template-columns:30px minmax(150px,1.1fr) 88px minmax(220px,1.8fr) 56px">
        <div>#</div>
        <div x-text="$store.wf.t('col_loc')"></div>
        <div class="text-right" x-text="$store.wf.t('col_eff')"></div>
        <div x-text="$store.wf.t('col_gets')"></div>
        <div class="text-right" x-text="$store.wf.t('col_runs')"></div>
      </div>

      <template x-for="(l, i) in $store.wf.locations" :key="l.planet+'|'+l.node+'|'+(l.type||'')+'|'+(l.rotation||'')">
        <div class="grid items-center gap-2 px-3 py-1.5 border-b border-line/50 last:border-0 hover:bg-panel text-sm"
             style="grid-template-columns:30px minmax(150px,1.1fr) 88px minmax(220px,1.8fr) 56px">
          <div class="text-xs text-dim font-mono" x-text="String(i+1).padStart(2,'0')"></div>

          <div class="min-w-0 leading-tight">
            <span class="font-medium" x-text="(l.planet ? l.planet+' / ' : '')+l.node"></span>
            <span class="text-[11px] text-dim font-mono ml-1" x-show="l.type" x-text="l.type"></span>
            <span class="text-[11px] text-dim font-mono ml-1" x-show="l.rotation" x-text="$store.wf.t('rotation')+l.rotation"></span>
            <span x-show="l.relics.length>1" class="text-[10px] text-haz border border-haz/40 px-1 ml-1" x-text="'×'+l.relics.length"></span>
          </div>

          <div class="text-right font-bold text-base text-haz tabular-nums" x-text="$store.wf.fmt(l.eff)+'%'"></div>

          <div class="min-w-0 leading-tight text-xs space-y-0.5">
            <template x-for="r in l.relics" :key="r.relic">
              <div class="truncate">
                <span class="font-mono text-txt" x-text="r.relic"></span>
                <span class="text-dim tabular-nums" x-text="$store.wf.fmt(r.relicChance)+'%'"></span>
                <span class="text-haz" x-text="'→ '+r.parts.join(', ')"></span>
              </div>
            </template>
          </div>

          <div class="text-right font-mono text-xs tabular-nums" x-text="$store.wf.expected(l.eff)"></div>
        </div>
      </template>

      <div x-show="!$store.wf.locations.length" class="p-6 text-dim text-sm text-center" x-text="$store.wf.t('no_relics')"></div>
    </div>

    <p x-show="$store.wf.selCount" class="text-[11px] text-dim leading-relaxed max-w-3xl" x-text="$store.wf.t('note')"></p>
  </div>
</section>
