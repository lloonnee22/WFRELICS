<section x-data class="space-y-6">
  <template x-if="!$store.wf.loaded">
    <div class="font-mono text-dim text-sm" x-text="$store.wf.t('loading')"></div>
  </template>

  <div x-show="$store.wf.loaded" class="space-y-6">
    <header class="space-y-2">
      <div class="font-mono text-xs tracking-widest text-haz" x-text="$store.wf.t('rel_label')"></div>
      <h1 class="text-3xl md:text-5xl font-extrabold tracking-tight" x-text="$store.wf.t('rel_title')"></h1>
      <p class="text-sm text-dim max-w-2xl leading-relaxed" x-text="$store.wf.t('rel_sub')"></p>
    </header>

    <div class="flex flex-wrap gap-2 items-center">
      <template x-for="t in $store.wf.tiers()" :key="t">
        <button @click="$store.wf.relicTier=t"
          :class="$store.wf.relicTier===t ? 'bg-txt text-ink border-txt' : 'bg-panel text-dim border-line hover:text-txt'"
          class="px-3 py-2 text-xs border" x-text="t==='all' ? $store.wf.t('all') : t"></button>
      </template>
    </div>

    <div class="grid gap-3" style="grid-template-columns:repeat(auto-fill,minmax(250px,1fr))">
      <template x-for="r in $store.wf.filteredRelics()" :key="r.id">
        <article class="bg-panel border border-line">
          <div class="flex items-center gap-2 border-b border-line px-2.5 py-2">
            <div class="w-8 h-8 border border-line flex items-center justify-center shrink-0 bg-ink">
              <img :src="$store.wf.cdn(r.image)" loading="lazy" alt="" class="max-w-full max-h-full object-contain" onerror="this.classList.add('broken')" />
            </div>
            <div class="min-w-0">
              <div class="font-bold leading-none truncate" x-text="r.id"></div>
              <div class="font-mono text-[10px] text-dim" x-text="r.tier"></div>
            </div>
            <div class="ml-auto text-right shrink-0" x-show="r.missions.length">
              <div class="text-haz font-bold text-sm leading-none" x-text="$store.wf.fmt(r.missions[0].chance)+'%'"></div>
              <div class="font-mono text-[9px] text-dim" x-text="$store.wf.t('best_farm')"></div>
            </div>
          </div>

          <div class="px-2.5 py-1.5 space-y-1 text-[13px]">
            <template x-for="rw in r.rewards" :key="rw.item">
              <div class="flex items-center gap-1.5">
                <span class="w-2 h-2 shrink-0" :class="rw.rarity==='Rare' ? 'bg-haz' : rw.rarity==='Uncommon' ? 'bg-txt' : 'bg-dim'"></span>
                <template x-if="rw.available">
                  <input type="checkbox" :checked="$store.wf.isSel(rw.item)" @change="$store.wf.toggle(rw.item)"
                    class="appearance-none w-3.5 h-3.5 border border-line bg-ink checked:bg-haz checked:border-haz shrink-0 cursor-pointer" />
                </template>
                <span class="flex-1 truncate leading-tight" :class="rw.available ? 'text-haz' : 'text-dim'" :title="rw.item" x-text="rw.item"></span>
                <span class="font-mono text-[11px] text-dim tabular-nums" x-text="$store.wf.fmt(rw.chances.Intact)+'%'"></span>
              </div>
            </template>
          </div>

          <div class="border-t border-line px-2.5 py-1.5 font-mono text-[10px] text-dim truncate" x-show="r.missions.length"
            :title="$store.wf.missionLabel(r.missions[0])">
            <span class="text-txt" x-text="$store.wf.missionLabel(r.missions[0])"></span><span x-show="r.missions[0].rotation" x-text="' · '+$store.wf.rotLabel(r.missions[0])"></span>
          </div>
        </article>
      </template>
    </div>
  </div>
</section>
